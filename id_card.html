<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon OOH Employee ID</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="id-card-body">

    <div class="id-card-container">
        <div class="id-card">
            <div class="id-header">
                <div class="id-logo-container">
                    <img src="logo.png" alt="Horizon OOH" class="id-logo-img">
                </div>
            </div>

            <div class="id-content">
                <div class="photo-frame">
                    <div class="photo-placeholder">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="employee-details">
                    <h2 class="emp-name">Ghufran Muhammed</h2>
                    <p class="emp-title">CEO</p>
                    <div class="emp-divider"></div>
                    <p class="emp-id">ID: 001</p>
                </div>

                <div class="id-qr-section">
                    <img src="qr_code.png" alt="QR Code" class="id-qr-code">
                </div>
            </div>

            <div class="id-footer">
                <div class="card-gold-bar bottom"></div>
                <p>www.horizon-ooh.com</p>
            </div>
        </div>
    </div>

</body>

</html>
