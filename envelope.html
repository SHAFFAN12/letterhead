<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon OOH Envelope</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="envelope-body">

    <div class="envelope-container">
        <div class="envelope">
            <!-- Decorative left bar -->
            <div class="env-left-bar"></div>

            <div class="env-content">
                <div class="env-brand-section">
                    <div class="logo-container env-logo">
                        <img src="logo.png" alt="Horizon OOH" class="logo-image">
                        <div class="brand-text">
                            <h1>HORIZON OOH</h1>
                            <p>Your Vision Zone</p>
                        </div>
                    </div>
                    <div class="env-return-address">
                        <p><i class="fa-solid fa-location-dot"></i> 123 Any Street, Suite 100, Your City, ST 2345</p>
                        <p><i class="fa-solid fa-phone"></i> +1 234 567 8900</p>
                        <p><i class="fa-solid fa-globe"></i> www.horizon-ooh.com</p>
                    </div>
                </div>

                <div class="env-recipient-area">
                    <p class="to-label">To:</p>
                    <div class="recipient-lines">
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </div>
                </div>
            </div>

            <!-- Bottom Accent -->
            <div class="env-bottom-bar"></div>
        </div>
    </div>

</body>

</html>
