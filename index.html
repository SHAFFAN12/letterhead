    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        document.getElementById('download-btn').addEventListener('click', function () {
            const element = document.querySelector('.page');

            // Temporarily remove box-shadow to prevent whitespace on borders in PDF
            const originalBoxShadow = element.style.boxShadow;
            element.style.boxShadow = 'none';

            // Temporarily remove flex and padding from body to fix left offset bug in html2canvas
            const originalBodyCssText = document.body.style.cssText;
            const originalHtmlCssText = document.documentElement.style.cssText;

            // Aggressive layout reset for capture
            document.documentElement.style.cssText = 'margin: 0; padding: 0; overflow: visible;';
            document.body.style.cssText = 'display: block; padding: 0; margin: 0; background: #fff; overflow: visible;';

            const originalElementMargin = element.style.margin;
            element.style.margin = '0 auto'; // Center it locally but at the top

            // Explicitly scroll to top to avoid offset issues
            window.scrollTo(0, 0);

            // Precise capture options
            const opt = {
                margin: 0,
                filename: 'Horizon_OOH_Letterhead.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: {
                    scale: 3, // High scale for precision
                    useCORS: true,
                    logging: false,
                    letterRendering: true,
                    scrollX: 0,
                    scrollY: 0,
                    windowWidth: document.documentElement.offsetWidth,
                    windowHeight: document.documentElement.offsetHeight,
                    width: element.offsetWidth,
                    height: element.offsetHeight,
                    x: element.getBoundingClientRect().left + window.scrollX,
                    y: element.getBoundingClientRect().top + window.scrollY
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.style.boxShadow = originalBoxShadow; // Restore box-shadow after generating PDF
                document.body.style.cssText = originalBodyCssText; // Restore body layout
                document.documentElement.style.cssText = originalHtmlCssText;
                element.style.margin = originalElementMargin;
            });
        });
    </script>
