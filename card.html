<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon OOH Visiting Card</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="card-body">

    <div class="card-container">
        <!-- Front Side -->
        <div class="business-card">
            <div class="card-gold-bar top"></div>

            <div class="card-content">
                <div class="card-left">
                    <div class="logo-container card-logo">
                        <img src="logo.png" alt="Horizon OOH" class="logo-image">
                        <div class="brand-text">
                            <h1>HORIZON OOH</h1>
                            <p>Your Vision Zone</p>
                        </div>
                    </div>
                </div>

                <div class="card-right">
                    <div class="person-info">
                        <h2 class="person-name">Ghufran Muhammed</h2>
                        <p class="person-title">CEO</p>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <div class="card-contact">
                    <div class="c-item"><i class="fa-solid fa-phone"></i> 03091329000</div>
                    <div class="c-item"><i class="fa-solid fa-envelope"></i> info@horizonooh.com</div>
                    <div class="c-item"><i class="fa-solid fa-globe"></i> www.horizonooh.com</div>
                </div>
                <div class="card-gold-bar bottom"></div>
            </div>
        </div>
    </div>

</body>

</html>
